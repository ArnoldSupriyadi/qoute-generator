<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Qoute Generator</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.2/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="qoute-container" id="qoute-container">
        <!-- Qoute -->
        <div class="qoute-text">
            <i class="fa fa-quote-left"></i>
            <span id="qoute">what you are is what you have been. what you'll be is what do you now.</span>
        </div>
        <!-- End of Qoute -->

        <!-- Author -->
        <div class="qoute-author">
            <span id="author">Buddha</span>
        </div>
        <!-- End of Author -->
        
        <!-- Buttons -->
        <div class="buttton-container">
            <button class="twitter-button" id="twitter" title="Tweet This!">
                <i class="fab fa-twitter"></i>
            </button>
            <button id="new-qoute">New Qoute</button>
        </div>
        <!-- End of Buttons -->
    </div>
    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
